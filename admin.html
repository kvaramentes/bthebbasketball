<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BtheB Admin - Cloud Version</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  /* Διατηρούμε το στυλ σου και προσθέτουμε το διαχωριστικό ομάδας */
  :root { --orange: #E8593C; --dark: #0D0D0D; --dark2: #141414; --cream: #F2EDE4; }
  body { background: var(--dark); color: var(--cream); font-family: 'Barlow', sans-serif; margin: 0; }
  .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
  
  .team-separator {
    background: #1c1c1c;
    padding: 10px 15px;
    margin: 20px 0 10px 0;
    border-left: 4px solid var(--orange);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 1px;
    display: flex;
    justify-content: space-between;
  }

  .player-row {
    background: var(--dark2);
    padding: 12px;
    border-bottom: 1px solid #222;
    display: grid;
    grid-template-columns: 2fr 1fr 1fr auto;
    align-items: center;
  }

  .captain-tag {
    color: var(--orange);
    font-weight: bold;
    font-size: 0.8em;
    margin-right: 5px;
    border: 1px solid var(--orange);
    padding: 2px 5px;
    border-radius: 3px;
  }

  button { cursor: pointer; background: var(--orange); color: white; border: none; padding: 10px 20px; font-family: 'Bebas Neue'; }
  input, select { padding: 8px; background: #222; border: 1px solid #333; color: white; }
  .nav { display: flex; gap: 10px; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 10px; }
  .nav-tab { cursor: pointer; opacity: 0.6; font-family: 'Bebas Neue'; font-size: 1.2rem; }
  .nav-tab.active { opacity: 1; color: var(--orange); border-bottom: 2px solid var(--orange); }
  .section { display: none; }
  .section.active { display: block; }
</style>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc, addDoc, query, orderBy, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBVAzwuSAZsQAQw3OKYdm3gRvnkQWF42dk",
    authDomain: "btheb-academy.firebaseapp.com",
    projectId: "btheb-academy",
    storageBucket: "btheb-academy.firebasestorage.app",
    messagingSenderId: "546227541301",
    appId: "1:546227541301:web:3b8d83ddc322284221687c"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // --- LIBRARIES ---
  window.loadData = async function() {
    console.log("Φόρτωση δεδομένων από Firebase...");
    await loadTeams();
    await loadPlayers();
  };

  // --- TEAMS ---
  async function loadTeams() {
    const q = query(collection(db, "teams"), orderBy("teamName"));
    const snap = await getDocs(q);
    const select = document.getElementById('player-team-select');
    const list = document.getElementById('teams-list');
    
    let html = '';
    let options = '<option value="">Επιλογή Ομάδας...</option>';
    
    snap.forEach(docSnap => {
      const team = docSnap.data();
      const id = docSnap.id;
      html += `<div class="player-row">
        <span>${team.teamName}</span>
        <span>${team.category || '-'}</span>
        <button onclick="deleteItem('teams', '${id}')">Διαγραφή</button>
      </div>`;
      options += `<option value="${team.teamName}">${team.teamName}</option>`;
    });
    
    if (list) list.innerHTML = html;
    if (select) select.innerHTML = options;
  }

  // --- PLAYERS (Η λογική ταξινόμησης που ζήτησες) ---
  async function loadPlayers() {
    const q = query(collection(db, "players"));
    const snap = await getDocs(q);
    const list = document.getElementById('players-list');
    
    let players = [];
    snap.forEach(d => players.push({ id: d.id, ...d.data() }));

    // Ομαδοποίηση ανά ομάδα
    const grouped = players.reduce((acc, p) => {
      const t = p.teamName || "ΧΩΡΙΣ ΟΜΑΔΑ";
      if (!acc[t]) acc[t] = [];
      acc[t].push(p);
      return acc;
    }, {});

    let html = '';
    const sortedTeams = Object.keys(grouped).sort();

    sortedTeams.forEach(teamName => {
      html += `<div class="team-separator"><span>${teamName}</span> <span>${grouped[teamName].length} ΑΘΛΗΤΕΣ</span></div>`;
      
      // Ταξινόμηση: Αρχηγός πρώτος, μετά Αλφαβητικά
      const sortedPlayers = grouped[teamName].sort((a, b) => {
        if (a.isCaptain && !b.isCaptain) return -1;
        if (!a.isCaptain && b.isCaptain) return 1;
        return (a.lastName || "").localeCompare(b.lastName || "", 'el');
      });

      sortedPlayers.forEach(p => {
        html += `
          <div class="player-row">
            <span>${p.isCaptain ? '<span class="captain-tag">C</span>' : ''} ${p.lastName} ${p.firstName}</span>
            <span>${p.position || '-'}</span>
            <span>${p.birthYear || '-'}</span>
            <button onclick="deleteItem('players', '${p.id}')">×</button>
          </div>`;
      });
    });
    
    list.innerHTML = html || '<p>Δεν βρέθηκαν αθλητές.</p>';
  }

  // --- ACTIONS ---
  window.saveTeam = async function(e) {
    e.preventDefault();
    const teamName = document.getElementById('team-name').value;
    if(!teamName) return;
    await addDoc(collection(db, "teams"), { teamName, createdAt: new Date() });
    document.getElementById('team-form').reset();
    loadData();
  };

  window.savePlayer = async function(e) {
    e.preventDefault();
    const p = {
      firstName: document.getElementById('p-firstname').value,
      lastName: document.getElementById('p-lastname').value,
      teamName: document.getElementById('player-team-select').value,
      isCaptain: document.getElementById('p-captain').checked,
      position: document.getElementById('p-pos').value,
      birthYear: document.getElementById('p-year').value
    };
    await addDoc(collection(db, "players"), p);
    document.getElementById('player-form').reset();
    loadData();
  };

  window.deleteItem = async function(coll, id) {
    if(confirm('Διαγραφή;')) {
      await deleteDoc(doc(db, coll, id));
      loadData();
    }
  };

  // Initialization
  window.onload = loadData;
</script>
</head>
<body>
  <div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <h1 style="font-family:'Bebas Neue'; color:var(--orange);">BtheB ADMIN PANEL</h1>
      <button onclick="loadData()" style="background:#333;">ΑΝΑΝΕΩΣΗ ΑΠΟ FIREBASE</button>
    </div>

    <div class="nav">
      <div class="nav-tab active" onclick="showSection('players')">ΑΘΛΗΤΕΣ</div>
      <div class="nav-tab" onclick="showSection('teams')">ΟΜΑΔΕΣ</div>
      <div class="nav-tab" onclick="showSection('stats')">ΣΤΑΤΙΣΤΙΚΑ</div>
    </div>

    <div id="players" class="section active">
      <form id="player-form" onsubmit="savePlayer(event)" style="background:#1a1a1a; padding:20px; margin-bottom:20px;">
        <input type="text" id="p-lastname" placeholder="Επώνυμο" required>
        <input type="text" id="p-firstname" placeholder="Όνομα" required>
        <select id="player-team-select" required></select>
        <label><input type="checkbox" id="p-captain"> Αρχηγός</label>
        <input type="text" id="p-pos" placeholder="Θέση (π.χ. PG)">
        <input type="number" id="p-year" placeholder="Έτος Γέννησης">
        <button type="submit">ΠΡΟΣΘΗΚΗ</button>
      </form>
      <div id="players-list"></div>
    </div>

    <div id="teams" class="section">
      <form id="team-form" onsubmit="saveTeam(event)" style="background:#1a1a1a; padding:20px; margin-bottom:20px;">
        <input type="text" id="team-name" placeholder="Όνομα Ομάδας" required>
        <button type="submit">ΠΡΟΣΘΗΚΗ ΟΜΑΔΑΣ</button>
      </form>
      <div id="teams-list"></div>
    </div>
  </div>

  <script>
    function showSection(id) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      event.target.classList.add('active');
    }
  </script>
</body>
</html>
